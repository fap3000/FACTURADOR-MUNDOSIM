<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - Mundosim Facturador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1a0a0a;
      color: #f5f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap { width: 100%; max-width: 380px; padding: 20px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .logo h1 span { color: #ffcccc; }
    .logo p { color: #a08080; font-size: 13px; margin-top: 6px; }
    .card {
      background: #2a1010;
      border: 1px solid #4a2020;
      border-radius: 12px;
      padding: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #a08080; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #1a0a0a;
      border: 1px solid #4a2020;
      border-radius: 7px;
      color: #f5f0f0;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color .15s;
    }
    input:focus { outline: none; border-color: #B22222; }
    .btn {
      width: 100%;
      background: #8B1A1A;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn:hover { background: #B22222; }
    .error-msg {
      background: rgba(239,83,80,.1);
      border: 1px solid rgba(239,83,80,.3);
      color: #ef5350;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .hint { text-align: center; color: #6b4040; font-size: 11px; margin-top: 20px; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>Mundosim <span>·</span> Facturador</h1>
      <p>Sistema de facturacion electronica ARCA</p>
    </div>
    <div class="card">
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" name="usuario" placeholder="mendoza / sanjuan / admin" autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label>Contrasena</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Ingresar</button>
      </form>
    </div>
  </div>
</body>
</html>
